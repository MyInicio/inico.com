<!DOCTYPE html>
<html lang="en">
<head>
    <title>FORMULARIOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="stylesforms.css">

</head>
<body>
    <h1 class="apartado">APARTADO DE FORMULARIOS</h1>
    <form>
        <p class="nombre">¿CUAL ES TU NOMBRE?</p>
        <input type="text" required name="NOMBRE DEL USER" placeholder="Escribe tu nombre" minlength="3" class="nombreinput">
    
    
        <p class="colorfav">¿CUAL ES TU COLOR FAVORITO?</p>"
        <input type="color" required name="COLOR FAVORITO DEL USER">
    
    
        <p class="correo">¿CUAL ES TU EMAIL?</p>
        <input type="email" required name="EMAIL DE USER" placeholder="Escribe tu Email" maxlength="13" class="correobotones">
    
        <p class="quearchivos">¿QUE ARCHIVO QUIERES COMPARTIR A LA PAGINA?</p>
        <input type="file" required name="LOS ARCHIVOS DEL USER" class="archivosbotones">
    
        <p class="fechas">¿CUAL ES TU FECHA DE CUMPLEAÑOS?</p>
        <input type="date" required name="LA FECHA DEL USER">
    </form>
    <div class="plantilla">
    <h1 class="principal1">PRINCIPAL</h1>
    <a href="/index.html" class="botonenlace">📒 INICIO</a>
</div>
</body>
</html>
